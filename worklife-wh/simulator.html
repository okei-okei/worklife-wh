<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生活シミュレーター | WorkLife WH</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="header">
      <h1>WorkLife WH</h1>

      <nav>
        <a href="index.html">ホーム</a>
        <a href="jobs.html">求人</a>
        <a href="properties.html">物件</a>
        <a href="simulator.html">シミュレーター</a>
      </nav>
    </header>

    <main style="padding: 40px; max-width: 800px; margin: auto">
      <h2>生活シミュレーター</h2>

      <p>求人と物件を選択すると、予想収支を計算できます。</p>

      <br />

      <label for="jobSelect">求人を選択</label>
      <br />

      <select id="jobSelect">
        <option value="">選択してください</option>
      </select>

      <br /><br />

      <label for="propertySelect">物件を選択</label>
      <br />

      <select id="propertySelect">
        <option value="">選択してください</option>
      </select>

      <br /><br />

      <button onclick="calculateSimulation()">シミュレーションする</button>

      <br /><br />

      <div class="card">
        <h3>シミュレーション結果</h3>

        <div id="result">求人と物件を選択してください</div>
      </div>
    </main>

    <script src="js/simulator.js"></script>
  </body>
</html>
